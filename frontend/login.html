<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — NexaBank</title>
  <meta name="description" content="Sign in to your NexaBank account to manage your finances." />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">N</div>
        <span>NexaBank</span>
      </div>

      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to your account to continue</p>

      <div class="alert alert-error" id="loginError"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required />
          <span class="form-error" id="emailErr">Please enter a valid email.</span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
          <span class="form-error" id="passwordErr">Password is required.</span>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
          Sign in
        </button>
      </form>

      <p style="text-align:center;margin-top:1.5rem;font-size:0.88rem;color:var(--text-muted)">
        Don't have an account? <a href="/register.html">Create one</a>
      </p>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const errorBox = document.getElementById('loginError');

    // Redirect if already logged in
    if (getToken()) {
      const payload = parseJwt(getToken());
      window.location.href = payload?.is_admin ? '/admin.html' : '/dashboard.html';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      let valid = true;

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showFieldError('email', 'emailErr'); valid = false;
      }
      if (!password) {
        showFieldError('password', 'passwordErr'); valid = false;
      }
      if (!valid) return;

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span> Signing in…';

      try {
        const data = await apiPost('/api/auth/login', { email, password });
        saveToken(data.access_token);
        const payload = parseJwt(data.access_token);
        window.location.href = payload?.is_admin ? '/admin.html' : '/dashboard.html';
      } catch (err) {
        showAlert(errorBox, err.message || 'Invalid email or password.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
