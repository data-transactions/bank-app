<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Your Account — NexaBank</title>
    <link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/output.css">
</head>

<body class="min-h-screen flex items-center justify-center p-6"
    style="background: linear-gradient(135deg, #050811 0%, #1e293b 100%);">
    <div class="w-full max-w-md bg-white rounded-3xl p-8 text-center shadow-2xl animate-in zoom-in-95 duration-500">
        <div id="loadingState">
            <div class="flex justify-center mb-6">
                <div class="logo-mark animate-pulse" style="width:60px;height:60px;font-size:24px;">N</div>
            </div>
            <h1 class="text-2xl font-bold mb-3">Verifying your account...</h1>
            <p class="text-slate-500">Please wait while we secure your access to NexaBank.</p>
            <div class="mt-8">
                <div
                    class="inline-block h-8 w-8 animate-spin rounded-full border-4 border-solid border-blue-600 border-r-transparent align-[-0.125em] motion-reduce:animate-[spin_1.5s_linear_infinite]">
                </div>
            </div>
        </div>

        <div id="successState" class="hidden">
            <div class="flex justify-center mb-6">
                <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600">
                    <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                        <polyline points="20 6 9 17 4 12" />
                    </svg>
                </div>
            </div>
            <h1 class="text-2xl font-bold mb-3">Account Verified!</h1>
            <p class="text-slate-500 mb-8">Your email has been confirmed. You can now access all NexaBank features.</p>
            <a href="/login/" class="btn btn-primary btn-lg w-full"
                style="border-radius:14px; height: 56px; display: flex; align-items: center; justify-content: center;">Go
                to Login</a>
        </div>

        <div id="errorState" class="hidden">
            <div class="flex justify-center mb-6">
                <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center text-red-600">
                    <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="8" x2="12" y2="12" />
                        <line x1="12" y1="16" x2="12.01" y2="16" />
                    </svg>
                </div>
            </div>
            <h1 class="text-2xl font-bold mb-3">Verification Failed</h1>
            <p id="errorMessage" class="text-slate-500 mb-8">The link is invalid or has expired.</p>
            <a href="/login/" class="btn btn-secondary btn-lg w-full"
                style="border-radius:14px; height: 56px; display: flex; align-items: center; justify-content: center;">Return
                to Login</a>
        </div>
    </div>

    <script src="/assets/js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get('email');
            const token = urlParams.get('token');

            if (!email || !token) {
                showState('error', 'Missing email or token in verification link.');
                return;
            }

            try {
                await NexaAPI.verifyEmail(email, token);
                showState('success');
            } catch (err) {
                showState('error', err.message || 'Verification link is invalid or has expired.');
            }
        });

        function showState(state, errorMsg) {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('successState').classList.add('hidden');
            document.getElementById('errorState').classList.add('hidden');

            if (state === 'success') {
                document.getElementById('successState').classList.remove('hidden');
            } else {
                document.getElementById('errorState').classList.remove('hidden');
                if (errorMsg) document.getElementById('errorMessage').textContent = errorMsg;
            }
        }
    </script>
</body>

</html>
