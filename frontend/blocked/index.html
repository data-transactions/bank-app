<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Account Blocked — NexaBank</title>
    <link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg">
    <!-- Use standard fonts matching the reference -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/output.css" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #111827;
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* Prevent scrolling as requested */
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mobile-container {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            margin: 0 auto;
            background-color: #f8fafc;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .blue-header {
            position: relative;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            padding: 50px 20px 80px 20px;
            color: white;
            text-align: center;
            /* overflow: hidden removed to allow profile overlap */
        }

        .bg-layer {
            position: absolute;
            inset: 0;
            overflow: hidden;
            z-index: 1;
        }

        .bg-circle-1 {
            position: absolute;
            top: -20px;
            right: 20px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .bg-circle-2 {
            position: absolute;
            bottom: 10%;
            left: -30px;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
        }

        .bg-circle-3 {
            position: absolute;
            top: 40px;
            right: -40px;
            width: 250px;
            height: 250px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
        }

        .fingerprint-icon {
            position: relative;
            z-index: 10;
            width: 64px;
            height: 64px;
            margin: 0 auto 20px auto;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .profile-container {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
        }

        .profile-pic {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid #f8fafc;
            background: white;
            object-fit: cover;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #cbd5e1;
            font-weight: bold;
            font-size: 24px;
        }

        .shield-badge {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 28px;
            height: 28px;
            background: #cbd5e1;
            border: 2px solid #f8fafc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            background: #3b82f6;
        }

        .content-body {
            padding: 60px 24px 24px 24px;
            flex-grow: 1;
        }

        .error-card {
            background-color: #fdf2f2;
            border-left: 5px solid #ef4444;
            border-radius: 0 12px 12px 0;
            padding: 20px;
            margin-top: 16px;
        }

        .footer-note {
            background: #f1f5f9;
            border-radius: 12px;
            padding: 16px;
            margin-top: 40px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }
    </style>
</head>

<body>
    <div class="mobile-container">
        <!-- Blue Header -->
        <div class="blue-header">
            <div class="bg-layer">
                <div class="bg-circle-1"></div>
                <div class="bg-circle-2"></div>
                <div class="bg-circle-3"></div>
            </div>

            <div class="fingerprint-icon">
                <svg width="32" height="32" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M12 22a10 10 0 0 1-10-10C2 6.5 6.5 2 12 2a10 10 0 0 1 10 10" />
                    <path d="M2.5 12A9.5 9.5 0 0 1 12 2.5a9.5 9.5 0 0 1 9.5 9.5" />
                    <path d="M7.5 16A4.5 4.5 0 0 1 12 11.5a4.5 4.5 0 0 1 4.5 4.5" />
                    <path d="M12 11.5V6" />
                    <path d="M12 16v.01" />
                    <path d="M15.5 15C15 13 13.5 12 12 12s-3 1-3.5 3" />
                </svg>
            </div>

            <h1 class="text-2xl font-bold mb-2 relative z-10 text-white shadow-sm">Verify Your Identity</h1>
            <p class="text-white/90 text-sm font-medium relative z-10 px-6">Please enter your secure 4-digit PIN to
                continue</p>

            <!-- Profile overlaps the border -->
            <div class="profile-container">
                <img id="userAvatar" src="" alt="Profile" class="profile-pic" style="display:none;"
                    onerror="this.style.display='none'; document.getElementById('userLetter').style.display='flex';">
                <div id="userLetter" class="profile-pic" style="color:#475569;">—</div>
                <div class="shield-badge">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                    </svg>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="content-body pt-12">
            <div class="text-center mb-6">
                <h2 id="userName" class="text-xl font-bold text-slate-800">User Account</h2>
            </div>

            <!-- Error Block Box -->
            <div class="error-card">
                <div class="flex items-start gap-3 mb-2">
                    <svg width="20" height="20" fill="none" stroke="#ef4444" stroke-width="2" viewBox="0 0 24 24"
                        class="mt-0.5">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="8" x2="12" y2="12" />
                        <line x1="12" y1="16" x2="12.01" y2="16" />
                    </svg>
                    <div>
                        <h3 class="font-bold text-[#b91c1c] text-[15px]">Account Blocked</h3>
                    </div>
                </div>
                <div class="pl-8">
                    <p class="text-[#991b1b] text-sm leading-relaxed mb-4">
                        Your NexaBank account has been blocked for security reasons.
                    </p>

                    <a href="mailto:info@myforgeconstructions.com"
                        class="flex items-center gap-2 text-[#b91c1c] font-semibold text-sm mb-3 opacity-90 hover:opacity-100 transition-opacity">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
                            viewBox="0 0 24 24">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                            <polyline points="22,6 12,13 2,6" />
                        </svg>
                        Contact Support
                    </a>

                    <button onclick="handleLogout()"
                        class="mt-6 w-full py-3 bg-white border border-red-200 text-red-600 font-bold rounded-xl shadow-sm hover:bg-red-50 hover:border-red-300 active:scale-[0.98] transition-all flex items-center justify-center gap-2 outline-none"
                        style="cursor: pointer;">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                            viewBox="0 0 24 24">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                            <polyline points="16 17 21 12 16 7" />
                            <line x1="21" y1="12" x2="9" y2="12" />
                        </svg>
                        Logout and Exit
                    </button>
                </div>
            </div>

            <!-- Footer Security Note -->
            <div class="footer-note">
                <svg width="18" height="18" fill="none" stroke="#64748b" stroke-width="2" viewBox="0 0 24 24"
                    style="flex-shrink:0;">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
                <p class="text-xs text-slate-500 font-medium leading-relaxed">
                    Your security is our priority. PIN verification protects your account from unauthorized access.
                </p>
            </div>
        </div>
    </div>

    <!-- Script to populate data -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const blockedUserRaw = sessionStorage.getItem('blocked_user');
            if (blockedUserRaw) {
                try {
                    const user = JSON.parse(blockedUserRaw);

                    // Name
                    if (user.full_name) {
                        document.getElementById('userName').textContent = user.full_name;

                        // Extract 2-letter initials
                        const parts = user.full_name.trim().split(/\s+/);
                        let initials = "—";
                        if (parts.length > 1 && parts[1].length > 0) {
                            initials = parts[0][0].toUpperCase() + parts[1][0].toUpperCase();
                        } else if (parts[0].length >= 2) {
                            initials = parts[0].substring(0, 2).toUpperCase();
                        } else if (parts[0].length === 1) {
                            initials = parts[0][0].toUpperCase();
                        }
                        document.getElementById('userLetter').textContent = initials;
                    }

                    // Profile Image
                    const img = document.getElementById('userAvatar');
                    if (user.profile_image_url && user.profile_image_url.trim() !== '') {
                        img.onload = () => {
                            img.style.display = 'flex';
                            document.getElementById('userLetter').style.display = 'none';
                        };
                        img.src = user.profile_image_url;
                    } else {
                        img.style.display = 'none';
                        document.getElementById('userLetter').style.display = 'flex';
                    }
                } catch (e) {
                    console.error('Error parsing blocked user:', e);
                }
            }
        });

        function handleLogout() {
            sessionStorage.removeItem('blocked_user');
            window.location.href = '/login/';
        }
    </script>
</body>

</html>
