<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — NexaBank</title>
  <meta name="description" content="Manage your NexaBank account, view transactions, deposit, withdraw and transfer funds." />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">N</div>
        <span>NexaBank</span>
      </div>
      <nav class="sidebar-nav">
        <a href="#overview"     class="nav-item active" id="nav-overview">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Overview
        </a>
        <a href="#transactions" class="nav-item" id="nav-txns">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M2 12h20"/></svg>
          Transactions
        </a>
        <a href="#transfer"     class="nav-item" id="nav-transfer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
          Transfer
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="nav-item" id="logoutBtn" style="cursor:pointer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main-content">
      <div class="page-header">
        <h1>Good day, <span id="userName">–</span> 👋</h1>
        <p>Here's what's happening with your account.</p>
      </div>

      <!-- Balance Card -->
      <div class="balance-card">
        <div class="balance-label">Total Balance</div>
        <div class="balance-amount" id="balance">$0.00</div>
        <div class="account-number">Acc: <span id="accountNumber">••••••••••</span></div>
      </div>

      <!-- Sections -->
      <section id="section-overview">
        <div class="card">
          <div class="card-header">
            <span class="card-title">Recent Transactions</span>
          </div>
          <div class="table-wrap">
            <table id="txTable">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Type</th>
                  <th>Description</th>
                  <th>Amount</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="txBody">
                <tr><td colspan="5" class="empty-state">Loading transactions…</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>

      <!-- Money Actions -->
      <section id="section-transfer" style="display:none">
        <div class="card" style="max-width:520px">
          <div class="tabs">
            <button class="tab-btn active" data-tab="deposit">Deposit</button>
            <button class="tab-btn" data-tab="withdraw">Withdraw</button>
            <button class="tab-btn" data-tab="transfer">Transfer</button>
          </div>

          <!-- Deposit -->
          <div class="tab-panel active" id="tab-deposit">
            <div class="alert alert-error"   id="depError"></div>
            <div class="alert alert-success" id="depSuccess"></div>
            <form id="depositForm">
              <div class="form-group">
                <label for="depAmount">Amount ($)</label>
                <input type="number" id="depAmount" min="1" step="0.01" placeholder="0.00" required />
              </div>
              <button type="submit" class="btn btn-primary btn-full" id="depBtn">Deposit</button>
            </form>
          </div>

          <!-- Withdraw -->
          <div class="tab-panel" id="tab-withdraw">
            <div class="alert alert-error"   id="wdError"></div>
            <div class="alert alert-success" id="wdSuccess"></div>
            <form id="withdrawForm">
              <div class="form-group">
                <label for="wdAmount">Amount ($)</label>
                <input type="number" id="wdAmount" min="1" step="0.01" placeholder="0.00" required />
              </div>
              <button type="submit" class="btn btn-primary btn-full" id="wdBtn">Withdraw</button>
            </form>
          </div>

          <!-- Transfer -->
          <div class="tab-panel" id="tab-transfer">
            <div class="alert alert-error"   id="trError"></div>
            <div class="alert alert-success" id="trSuccess"></div>
            <form id="transferForm">
              <div class="form-group">
                <label for="trAccount">Recipient Account Number</label>
                <input type="text" id="trAccount" placeholder="NX0000000000" required />
              </div>
              <div class="form-group">
                <label for="trAmount">Amount ($)</label>
                <input type="number" id="trAmount" min="1" step="0.01" placeholder="0.00" required />
              </div>
              <div class="form-group">
                <label for="trDesc">Description (optional)</label>
                <input type="text" id="trDesc" placeholder="Rent, bills…" />
              </div>
              <button type="submit" class="btn btn-primary btn-full" id="trBtn">Send Money</button>
            </form>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
