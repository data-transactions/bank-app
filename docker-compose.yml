version: '3.3'

services:
  db:
    image: mysql:8
    container_name: nexabank_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: nexabank_db
      MYSQL_USER: nexabank_user
      MYSQL_PASSWORD: nexabank_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - nexabank_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "nexabank_user", "-pnexabank_password"]
      interval: 5s
      timeout: 10s
      retries: 10

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexabank_app
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/uploads:/app/uploads
    networks:
      - nexabank_net
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  nginx:
    image: nginx:alpine
    container_name: nexabank_nginx
    restart: unless-stopped
    ports:
      - "5501:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./backend/uploads:/usr/share/nginx/html/uploads
    depends_on:
      - app
    networks:
      - nexabank_net

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: nexabank_phpmyadmin
    restart: unless-stopped
    ports:
      - "8181:80"
    environment:
      PMA_HOST: db
      PMA_USER: nexabank_user
      PMA_PASSWORD: nexabank_password
    depends_on:
      - db
    networks:
      - nexabank_net

volumes:
  mysql_data:

networks:
  nexabank_net:
    driver: bridge
