version: '3.3'

services:
  db:
    image: postgres:15-alpine
    container_name: nexabank_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexabank_db
      POSTGRES_USER: nexabank_user
      POSTGRES_PASSWORD: nexabank_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nexabank_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexabank_user -d nexabank_db"]
      interval: 5s
      timeout: 10s
      retries: 10

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexabank_app
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/uploads:/app/uploads
    networks:
      - nexabank_net

  nginx:
    image: nginx:alpine
    container_name: nexabank_nginx
    restart: unless-stopped
    ports:
      - "5501:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./backend/uploads:/usr/share/nginx/html/uploads
    depends_on:
      - app
    networks:
      - nexabank_net

  adminer:
    image: adminer:latest
    container_name: nexabank_adminer
    restart: unless-stopped
    ports:
      - "8181:8080"
    depends_on:
      - db
    networks:
      - nexabank_net

volumes:
  postgres_data:

networks:
  nexabank_net:
    driver: bridge
